---
layout: default
---

{% unless page.hide_title %}
<div class="page-hero">
  <div class="wrapper">
    {%- if page.eyebrow -%}
      <span class="eyebrow">{{ page.eyebrow | escape }}</span>
    {%- endif -%}
    <h1 class="page-heading">{{ page.title | escape }}</h1>
    {%- if page.lede -%}
      <p class="page-lede page-hero__lede">{{ page.lede }}</p>
    {%- endif -%}
  </div>
</div>
{% endunless %}

<div class="wrapper">
  <article class="post">
    <div class="post-content">
      {{ content }}
    </div>
  </article>
</div>
